<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.8;
            letter-spacing: 0.3px;
        }

        /* Vortex background — fixed and owns its own perspective so scrolling doesn't shift it */
        .vortex-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            perspective: 1200px;
        }

        .vortex-scene {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transform: rotateX(5deg);
        }

        .vortex-ring {
            position: absolute;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }

        .vortex-item {
            position: absolute;
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.35);
            background: #000;
        }

        .vortex-item img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
        }

        /* ── Ring 1 — TOP, wide radius, LARGE tiles ── */
        .ring1 {
            transform: translateY(-200px) rotateY(0deg);
            animation: spin1Fast 5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .ring1 .vortex-item { width: 240px; height: 240px; margin: -120px 0 0 -120px; opacity: 1; }
        .ring1 .vortex-item:nth-child(1)  { transform: rotateY(0deg)      translateZ(370px); }
        .ring1 .vortex-item:nth-child(2)  { transform: rotateY(45deg)     translateZ(370px); }
        .ring1 .vortex-item:nth-child(3)  { transform: rotateY(90deg)     translateZ(370px); }
        .ring1 .vortex-item:nth-child(4)  { transform: rotateY(135deg)    translateZ(370px); }
        .ring1 .vortex-item:nth-child(5)  { transform: rotateY(180deg)    translateZ(370px); }
        .ring1 .vortex-item:nth-child(6)  { transform: rotateY(225deg)    translateZ(370px); }
        .ring1 .vortex-item:nth-child(7)  { transform: rotateY(270deg)    translateZ(370px); }
        .ring1 .vortex-item:nth-child(8)  { transform: rotateY(315deg)    translateZ(370px); }

        /* ── Ring 2 — MIDDLE, medium radius ── */
        .ring2 {
            transform: translateY(0px) rotateY(0deg);
            animation: spin2Fast 5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .ring2 .vortex-item { width: 200px; height: 200px; margin: -100px 0 0 -100px; opacity: 0.9; }
        .ring2 .vortex-item:nth-child(1)  { transform: rotateY(0deg)      translateZ(280px); }
        .ring2 .vortex-item:nth-child(2)  { transform: rotateY(45deg)     translateZ(280px); }
        .ring2 .vortex-item:nth-child(3)  { transform: rotateY(90deg)     translateZ(280px); }
        .ring2 .vortex-item:nth-child(4)  { transform: rotateY(135deg)    translateZ(280px); }
        .ring2 .vortex-item:nth-child(5)  { transform: rotateY(180deg)    translateZ(280px); }
        .ring2 .vortex-item:nth-child(6)  { transform: rotateY(225deg)    translateZ(280px); }
        .ring2 .vortex-item:nth-child(7)  { transform: rotateY(270deg)    translateZ(280px); }
        .ring2 .vortex-item:nth-child(8)  { transform: rotateY(315deg)    translateZ(280px); }

        /* ── Ring 3 — BOTTOM, tight radius, SMALL tiles ── */
        .ring3 {
            transform: translateY(180px) rotateY(0deg);
            animation: spin3Fast 5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .ring3 .vortex-item { width: 150px; height: 150px; margin: -75px 0 0 -75px; opacity: 0.7; }
        .ring3 .vortex-item:nth-child(1)  { transform: rotateY(0deg)      translateZ(180px); }
        .ring3 .vortex-item:nth-child(2)  { transform: rotateY(51.4deg)   translateZ(180px); }
        .ring3 .vortex-item:nth-child(3)  { transform: rotateY(102.8deg)  translateZ(180px); }
        .ring3 .vortex-item:nth-child(4)  { transform: rotateY(154.2deg)  translateZ(180px); }
        .ring3 .vortex-item:nth-child(5)  { transform: rotateY(205.7deg)  translateZ(180px); }
        .ring3 .vortex-item:nth-child(6)  { transform: rotateY(257.1deg)  translateZ(180px); }
        .ring3 .vortex-item:nth-child(7)  { transform: rotateY(308.5deg)  translateZ(180px); }

        /* Slow continuous phase — each ring spins at a different rate for twirl feel */
        .vortex-scene.slowmode .ring1 { animation: spin1Slow 30s linear infinite; }
        .vortex-scene.slowmode .ring2 { animation: spin2Slow 55s linear infinite; }
        .vortex-scene.slowmode .ring3 { animation: spin3Slow 80s linear infinite; }

        @keyframes spin1Fast {
            0%   { transform: translateY(-200px) rotateY(0deg); }
            100% { transform: translateY(-200px) rotateY(1440deg); }
        }
        @keyframes spin2Fast {
            0%   { transform: translateY(0px) rotateY(0deg); }
            100% { transform: translateY(0px) rotateY(720deg); }
        }
        @keyframes spin3Fast {
            0%   { transform: translateY(180px) rotateY(0deg); }
            100% { transform: translateY(180px) rotateY(-540deg); }
        }
        @keyframes spin1Slow {
            from { transform: translateY(-200px) rotateY(0deg); }
            to   { transform: translateY(-200px) rotateY(360deg); }
        }
        @keyframes spin2Slow {
            from { transform: translateY(0px) rotateY(0deg); }
            to   { transform: translateY(0px) rotateY(360deg); }
        }
        @keyframes spin3Slow {
            from { transform: translateY(180px) rotateY(0deg); }
            to   { transform: translateY(180px) rotateY(-360deg); }
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 80px 32px;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            text-align: center;
            position: relative;
            z-index: 10;
            isolation: isolate;
            scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        header {
            margin-bottom: 80px;
            border-bottom: 1px solid #000000;
            padding-bottom: 40px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.6);
        }

        .tagline {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #000000;
            margin-bottom: 16px;
            text-transform: uppercase;
            text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 32px rgba(255,255,255,0.7);
        }

        .portfolio-link {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 1px;
            color: #76C4FF;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .portfolio-link:hover {
            border-bottom-color: #76C4FF;
        }

        /* Featured */
        .featured {
            margin-bottom: 60px;
            padding: 40px;
            border: 1px solid #000000;
            background: rgba(249, 249, 249, 0.92);
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.5);
        }

        .featured-label {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #76C4FF;
            font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 32px rgba(255,255,255,0.7);
        }

        .featured-title {
            font-size: 36px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.8), 0 0 60px rgba(255,255,255,0.6);
        }

        .featured-cta {
            display: inline-block;
            padding: 10px 22px;
            border: 1px solid #000000;
            background: #000000;
            color: #ffffff;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .featured-cta:hover {
            background: #76C4FF;
            border-color: #76C4FF;
            color: #ffffff;
        }

        /* Sections */
        .section { margin-bottom: 80px; }

        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 16px;
        }

        .section-number {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #76C4FF;
            font-weight: 900;
            min-width: 20px;
            text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 32px rgba(255,255,255,0.7);
        }

        .section-title {
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 16px rgba(255,255,255,0.9), 0 0 32px rgba(255,255,255,0.7);
        }

        /* Track list */
        .tracks-grid {
            display: grid;
            gap: 10px;
        }

        .track-item {
            display: grid;
            grid-template-columns: 40px 1fr 16px;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            text-decoration: none;
            color: #000000;
            transition: all 0.2s ease;
            opacity: 0;
            will-change: transform, opacity;
            text-align: left;
        }

        .track-item.slide-from-left {
            animation: slideInFromLeft 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .track-item.slide-from-right {
            animation: slideInFromRight 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .track-item:hover {
            border-color: #76C4FF;
            background: #fff6f2;
        }

        .track-num {
            font-size: 11px;
            letter-spacing: 1px;
            color: #999999;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .track-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .track-arrow {
            font-size: 14px;
            color: #999999;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.2s ease;
        }

        .track-item:hover .track-arrow {
            opacity: 1;
            transform: translateX(0);
            color: #76C4FF;
        }

        /* Stream platforms */
        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .platform-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            text-decoration: none;
            color: #000000;
            transition: all 0.2s ease;
            font-size: 12px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .platform-item:hover {
            border-color: #76C4FF;
            background: #fff6f2;
            color: #76C4FF;
        }

        /* Socials */
        .socials {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 120px 40px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            border-top: none;
            min-height: 400px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,69,0,0.02));
        }

        .app-label {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 84px;
            font-weight: 700;
            color: #000000;
            letter-spacing: -2px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 5;
            text-align: center;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .app-label.visible { opacity: 0.85; }

        .social-link {
            width: 44px;
            height: 44px;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: none;
            position: absolute;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.08));
            background: #ffffff;
            z-index: 10;
            top: 0; left: 0;
        }

        .social-link:hover {
            border-color: #76C4FF;
            background: #fff6f2;
            animation-play-state: paused;
            filter: drop-shadow(0 6px 16px rgba(255, 69, 0, 0.2));
            transform: scale(1.1) !important;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            stroke: #000000;
            fill: none;
            stroke-width: 1.5;
        }

        .social-link:hover svg { stroke: #76C4FF; }

        footer {
            margin-top: 120px;
            padding-top: 40px;
            border-top: 1px solid #e0e0e0;
            font-size: 11px;
            color: #999999;
            letter-spacing: 1.5px;
            text-align: center;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .container { padding: 60px 20px; }
            header { margin-bottom: 60px; padding-bottom: 30px; }
            .logo { font-size: 26px; }
            .featured { padding: 30px 24px; margin-bottom: 50px; }
            .featured-title { font-size: 28px; }
            .section { margin-bottom: 60px; }
            .platforms-grid { grid-template-columns: 1fr; }
            footer { margin-top: 80px; }
        }
    </style>
</head>

    <script>
        // Pixelate all vortex cover art to a true 7x7 mosaic
        (function pixelateVortex() {
            const PIX = 14;
            document.querySelectorAll('.vortex-item img').forEach(img => {
                const originalSrc = img.src;
                const loader = new Image();
                loader.crossOrigin = 'anonymous';
                loader.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = PIX;
                    canvas.height = PIX;
                    const ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.drawImage(loader, 0, 0, PIX, PIX);
                    try {
                        img.src = canvas.toDataURL();
                    } catch (e) { /* CORS blocked — keep original */ }
                };
                loader.onerror = () => { /* fall back to original */ };
                loader.src = originalSrc;
            });
        })();

        // Show "New Release!" until May 1 2026, then revert to "Featured Track"
        (function() {
            var expiry = new Date('2026-05-01T00:00:00');
            var label = document.getElementById('featured-label');
            if (label && Date.now() < expiry.getTime()) {
                label.textContent = 'New Release!';
            }
        })();

        const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -100px 0px' };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    const parent = entry.target.parentElement;
                    const items = Array.from(parent.querySelectorAll('.track-item'));
                    const idx = items.indexOf(entry.target);
                    entry.target.classList.add(idx % 2 === 0 ? 'slide-from-left' : 'slide-from-right');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.track-item').forEach(item => observer.observe(item));

        class PhysicsParticle {
            constructor(element, containerWidth, containerHeight) {
                this.element = element;
                this.containerWidth = containerWidth;
                this.containerHeight = containerHeight;
                this.size = 44;
                this.x = Math.random() * (containerWidth - this.size);
                this.y = Math.random() * (containerHeight - this.size);
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.35 + Math.random() * 0.25;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 1.0;
                this.bounceDamping = 1.0;
                this.rotation = 0;
                this.rotationVelocity = (Math.random() - 0.5) * 0.35;
            }
            update(particles) {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationVelocity;
                if (this.x <= 0) { this.x = 0; this.vx *= -this.bounceDamping; this.rotationVelocity *= -1; }
                if (this.x >= this.containerWidth - this.size) { this.x = this.containerWidth - this.size; this.vx *= -this.bounceDamping; this.rotationVelocity *= -1; }
                if (this.y <= 0) { this.y = 0; this.vy *= -this.bounceDamping; }
                if (this.y >= this.containerHeight - this.size) { this.y = this.containerHeight - this.size; this.vy *= -this.bounceDamping; this.rotationVelocity *= -0.5; }
                particles.forEach(other => {
                    if (other === this) return;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = this.size + other.size;
                    if (distance < minDistance) {
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        const vx1 = this.vx * cos + this.vy * sin;
                        const vy1 = this.vy * cos - this.vx * sin;
                        const vx2 = other.vx * cos + other.vy * sin;
                        const vy2 = other.vy * cos - other.vx * sin;
                        this.vx = vx2 * cos - vy1 * sin;
                        this.vy = vy1 * cos + vx2 * sin;
                        other.vx = vx1 * cos - vy2 * sin;
                        other.vy = vy2 * cos + vx1 * sin;
                        const overlap = (minDistance - distance) / 2 + 1;
                        this.x -= overlap * cos;
                        this.y -= overlap * sin;
                        other.x += overlap * cos;
                        other.y += overlap * sin;
                    }
                });
                this.element.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${this.rotation}deg)`;
            }
        }

        window.addEventListener('load', () => {
            const socialsContainer = document.querySelector('.socials');
            const socialLinks = Array.from(document.querySelectorAll('.social-link'));
            if (socialsContainer && socialLinks.length > 0) {
                let containerWidth = socialsContainer.offsetWidth || 400;
                let containerHeight = socialsContainer.offsetHeight || 400;
                const particles = socialLinks.map(link => new PhysicsParticle(link, containerWidth, containerHeight));
                let animationFrameId;
                const animate = () => {
                    particles.forEach(p => p.update(particles));
                    animationFrameId = requestAnimationFrame(animate);
                };
                const appLabel = document.querySelector('.app-label');
                socialLinks.forEach(link => {
                    link.addEventListener('mouseenter', () => {
                        cancelAnimationFrame(animationFrameId);
                        appLabel.textContent = link.dataset.app;
                        appLabel.classList.add('visible');
                    });
                    link.addEventListener('mouseleave', () => {
                        animate();
                        appLabel.classList.remove('visible');
                    });
                });
                window.addEventListener('resize', () => {
                    containerWidth = socialsContainer.offsetWidth;
                    containerHeight = socialsContainer.offsetHeight;
                    particles.forEach(p => { p.containerWidth = containerWidth; p.containerHeight = containerHeight; });
                });
                animate();
            }
        });

        const vortexScene = document.querySelector('.vortex-scene');
        const ring1El = document.querySelector('.ring1');
        if (vortexScene && ring1El) {
            ring1El.addEventListener('animationend', () => {
                vortexScene.classList.add('slowmode');
            });
        }
    </script>
